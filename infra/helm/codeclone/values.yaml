image:
  repository: ghcr.io/sanjays2402/codeclone
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 7461

ingress:
  enabled: false
  className: nginx
  host: codeclone.example.com
  tls: false

env:
  CODECLONE_SERVE_HOST: "0.0.0.0"
  CODECLONE_SERVE_PORT: "7461"
  LOG_LEVEL: "INFO"
  LOG_JSON: "1"
  # Audit log rotation. Keeps the JSONL audit trail bounded on the pod's
  # ephemeral disk; rotated files are gzip-compressed with a UTC timestamp
  # suffix. Ship them to a SIEM (Filebeat, Vector, Promtail) before the
  # retention window closes. Set CODECLONE_AUDIT_LOG_MAX_BYTES="0" to keep
  # the legacy single-file behavior.
  CODECLONE_AUDIT_LOG_ENABLED: "true"
  CODECLONE_AUDIT_LOG_PATH: "/var/log/codeclone/audit.log"
  CODECLONE_AUDIT_LOG_MAX_BYTES: "52428800"
  CODECLONE_AUDIT_LOG_BACKUP_COUNT: "14"

# API key is mounted from a secret you create out-of-band:
#   kubectl create secret generic codeclone-secrets --from-literal=api-key=sk-...
secretRefName: codeclone-secrets

# Optional multi-key keyring with per-key scopes (RBAC). When enabled the pod
# also reads `api-keys` from the same secret and exposes it as the
# CODECLONE_API_KEYS env var. Format is `key1:scope+scope,key2:*`; known
# scopes are `models:read`, `infer`, and `admin` (`*` means all). The single
# `api-key` entry above keeps working and is implicitly granted `*`. Create
# both at once with:
#   kubectl create secret generic codeclone-secrets \
#     --from-literal=api-key=sk-legacy \
#     --from-literal=api-keys=sk-ci:models:read,sk-app:infer,sk-ops:*
apiKeys:
  enabled: false

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "4Gi"

# Mount a PVC of adapters (read-only) so the pod serves your own LoRA.
adapters:
  pvcName: ""    # set to mount your adapters
  mountPath: /app/adapters

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false

probes:
  liveness:
    httpGet:
      path: /healthz
      port: 7461
    initialDelaySeconds: 10
    periodSeconds: 20
  readiness:
    httpGet:
      path: /readyz
      port: 7461
    initialDelaySeconds: 5
    periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

# Audit log volume. By default the rotated JSONL trail lives on an emptyDir
# so the pod can run with a read-only root filesystem and so log growth is
# bounded by `emptyDirSizeLimit`. Set persistence.enabled=true (and either
# `existingClaim` or pre-create `<release>-audit`) to keep audit history
# across pod restarts; ship to a SIEM either way.
auditLog:
  emptyDirSizeLimit: "2Gi"
  persistence:
    enabled: false
    existingClaim: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

# PodDisruptionBudget keeps at least one pod available during voluntary
# disruptions (node drains, rolling upgrades). Enable once you run >1 replica.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1   # use one or the other, not both

# NetworkPolicy locks the pod down to: DNS to kube-dns, HTTPS to public
# internet (for HF model pulls), and inbound on the service port from any pod
# in the cluster. Override `ingress.from` to restrict callers further.
networkPolicy:
  enabled: false
  ingress:
    from: []   # e.g. - namespaceSelector: { matchLabels: { name: gateway } }
  egress: []   # override the default DNS + HTTPS rules if you need stricter

# `helm test` smoke-test hook. Renders a short-lived Pod that probes
# /healthz, /readyz, /metrics, and the auth gate of the live release.
# Run with `helm test <release> --logs` after install or upgrade.
tests:
  enabled: true
  # busybox ships wget; ~1MB and runs as non-root cleanly.
  image: busybox:1.36
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"
  # Override only if your cluster forbids the default fsGroup/runAsUser for
  # ephemeral test pods. Falls back to the chart-wide security contexts.
  podSecurityContext: {}
  containerSecurityContext: {}

# ServiceMonitor lets a Prometheus Operator install scrape /metrics directly.
# Requires the prometheus-operator CRDs to be present in the cluster.
serviceMonitor:
  enabled: false
  namespace: ""            # defaults to release namespace
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  additionalLabels: {}     # e.g. release: kube-prometheus-stack
  relabelings: []
  metricRelabelings: []

apiVersion: v1
kind: Service
metadata:
  name: {{ include "codeclone.fullname" . }}
  labels: {{- include "codeclone.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
  selector: {{- include "codeclone.selectorLabels" . | nindent 4 }}

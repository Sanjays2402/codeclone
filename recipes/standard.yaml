name: standard
description: ~3 h on Apple Silicon 32GB+. Stronger adapter, wider target modules.

safety:
  require_author_match: true
  skip_merge_commits: true
  skip_reverts: true
  license_filter: permissive_only
  min_commit_age_days: 0
  max_files_per_commit: 64
  max_diff_lines: 4000
  drop_secret_lines: true

data:
  languages: [py, ts, js, go, rust, java]
  min_lines: 3
  max_lines: 600
  dedupe: minhash
  train_split: 0.9
  val_split: 0.05
  test_split: 0.05
  shuffle_seed: 42

model:
  base: Qwen/Qwen2.5-Coder-3B
  context_length: 2048
  lora_rank: 32
  lora_alpha: 64
  lora_dropout: 0.05
  lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

train:
  backend: auto
  batch_size: 4
  grad_accum: 2
  learning_rate: 1.5e-4
  warmup_steps: 50
  max_steps: 3000
  eval_every: 250
  save_every: 500
  seed: 1337
  bf16: true
  gradient_checkpointing: true

eval:
  perplexity: true
  mini_humaneval: true
  sample_completions: 8
  max_problems: 32

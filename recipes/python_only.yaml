name: python-only
description: Train only on Python; smaller batches, longer context.

safety:
  require_author_match: true
  skip_merge_commits: true
  skip_reverts: true
  license_filter: permissive_only
  drop_secret_lines: true

data:
  languages: [py]
  min_lines: 4
  max_lines: 400
  dedupe: exact
  train_split: 0.9
  val_split: 0.05
  test_split: 0.05
  shuffle_seed: 42

model:
  base: Qwen/Qwen2.5-Coder-1.5B
  context_length: 2048
  lora_rank: 16
  lora_alpha: 32
  lora_target_modules: [q_proj, k_proj, v_proj, o_proj]

train:
  backend: auto
  batch_size: 3
  grad_accum: 2
  learning_rate: 2.0e-4
  warmup_steps: 30
  max_steps: 1500
  eval_every: 150
  save_every: 250
  seed: 1337
  bf16: true
  gradient_checkpointing: true

eval:
  perplexity: true
  mini_humaneval: true
  sample_completions: 4
  max_problems: 16

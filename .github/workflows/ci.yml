name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# CI is gated on the repository variable `ENABLE_CI` (set to "1" to enable).
# This keeps Actions minutes near zero by default since training-adjacent
# pipelines burn through budgets quickly when accidentally on.
env:
  ENABLE_CI: ${{ vars.ENABLE_CI }}

jobs:
  pytest:
    if: ${{ vars.ENABLE_CI == '1' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv
        run: pip install uv
      - name: Install
        run: uv pip install --system ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  build-image:
    if: ${{ vars.ENABLE_CI == '1' }}
    runs-on: ubuntu-latest
    needs: pytest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/codeclone:latest
            ghcr.io/${{ github.repository_owner }}/codeclone:${{ github.sha }}

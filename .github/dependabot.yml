# Dependabot config. The auto-merge workflow at
# .github/workflows/dependabot-auto-merge.yml already exists; without this file
# it has nothing to merge. Keep ecosystems pinned to what the repo actually
# uses so we don't get noise from unrelated package managers.
version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: daily
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(actions)
      include: scope

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore(deps)
      include: scope

openapi: 3.0.3
info:
  title: CodeClone
  version: 0.1.0
  description: OpenAI-compatible API for a personally fine-tuned code model.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: http://127.0.0.1:7461
    description: Local development
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: ok
  /readyz:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: ready
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: prom text format
  /v1/models:
    get:
      security: [{ bearerAuth: [] }]
      summary: List available models
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"
  /v1/chat/completions:
    post:
      security: [{ bearerAuth: [] }]
      summary: Chat completion (OpenAI v1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
            text/event-stream:
              schema:
                type: string
  /v1/completions:
    post:
      security: [{ bearerAuth: [] }]
      summary: Text completion (OpenAI v1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletionRequest"
      responses:
        "200":
          description: ok

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    ModelList:
      type: object
      required: [object, data]
      properties:
        object: { type: string, enum: [list] }
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              object: { type: string }
              created: { type: integer }
              owned_by: { type: string }
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role: { type: string, enum: [system, user, assistant, tool] }
        content: { type: string }
        name: { type: string }
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model: { type: string }
        messages:
          type: array
          items: { $ref: "#/components/schemas/ChatMessage" }
        temperature: { type: number, default: 0.2 }
        max_tokens: { type: integer, default: 512 }
        stream: { type: boolean, default: false }
        stop:
          oneOf:
            - { type: string }
            - { type: array, items: { type: string } }
    ChatCompletionResponse:
      type: object
      properties:
        id: { type: string }
        object: { type: string, enum: [chat.completion] }
        model: { type: string }
        choices:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              message: { $ref: "#/components/schemas/ChatMessage" }
              finish_reason: { type: string }
        usage:
          type: object
          properties:
            prompt_tokens: { type: integer }
            completion_tokens: { type: integer }
            total_tokens: { type: integer }
    CompletionRequest:
      type: object
      required: [model, prompt]
      properties:
        model: { type: string }
        prompt:
          oneOf:
            - { type: string }
            - { type: array, items: { type: string } }
        temperature: { type: number, default: 0.2 }
        max_tokens: { type: integer, default: 256 }
        stream: { type: boolean, default: false }
        fim_prefix: { type: string }
        fim_suffix: { type: string }
